        function initWackenderLogic() {
            const canvas = document.getElementById('wack-canvas');
            const ctx = canvas.getContext('2d');
            const scannerCanvas = document.getElementById('wack-scanner');
            const sCtx = scannerCanvas.getContext('2d');

            // --- AUDIO CONTEXT (Som Arcade Synth) ---
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const audioCtx = new AudioContext();

            // Função para som de tiro "PEW"
            function playPew() {
                // Alguns navegadores exigem interação antes de tocar som
                if (audioCtx.state === "suspended") {
                    audioCtx.resume();
                }

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = "square"; // Som mais retrô
                osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(
                    200,
                    audioCtx.currentTime + 0.08
                );

                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(
                    0.001,
                    audioCtx.currentTime + 0.08
                );

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.08);
            }

            // Constantes do Jogo
            const WORLD_WIDTH = 4000; // Mundo muito maior que a tela (Estilo Defender)
            const VIEW_WIDTH = 800;
            const VIEW_HEIGHT = 400;
            const SHOOT_COOLDOWN = 200; // 100ms = 0.1s
            let lastShotTime = 0;

            // Estado Global
            const state = {
                playing: false,
                score: 0,
                lives: 3,
                bombs: 3,
                shake: 0,
                keys: {},
                cameraX: 0,

                wackStarted: false,
                usedBomb: false,

                player: {
                    worldX: 2000,
                    y: 200,
                    w: 40, h: 20,
                    vx: 0, vy: 0,
                    faceRight: true,
                    thrust: 0.8,
                    maxSpeed: 12,
                    friction: 0.96,
                    rotationY: 0,        // ângulo atual
                    targetRotationY: 0   // ângulo desejado
                },

                enemies: [],
                bullets: [],
                particles: [],
                stars: [],
                terrainY: [] // Pontos de altura do terreno
            };

            // Inicialização de Estrelas e Terreno
            function initBackground() {
                state.stars = Array(100).fill(0).map(() => ({
                    x: Math.random() * WORLD_WIDTH,
                    y: Math.random() * VIEW_HEIGHT,
                    s: Math.random() * 2 + 1,
                    color: Math.random() > 0.8 ? '#ff00ff' : '#ffffff'
                }));

                // Gerar terreno procedural ondulado
                state.terrainY = [];
                let y = 350;
                for (let x = 0; x <= WORLD_WIDTH; x += 50) {
                    y += (Math.random() - 0.5) * 40;
                    if (y > 390) y = 390;
                    if (y < 320) y = 320;
                    state.terrainY.push({ x, y });
                }
            }

            window.startWackender = () => {
                document.getElementById('wack-menu').classList.add('hidden');
                state.playing = true;

                if (!state.wackStarted) {
                    unlockAchievement("wack_first");
                    state.wackStarted = true;
                }

                state.score = 0;
                state.lives = 3;
                state.bombs = 3;
                state.player.worldX = 2000;
                state.player.vx = 0;
                state.player.vy = 0;
                state.enemies = [];
                state.bullets = [];
                state.particles = [];

                updateHUD();
                initBackground();
                spawnWave();
                gameLoop();
            };

            function updateHUD() {
                document.getElementById('wack-score').innerText = state.score;
                document.getElementById('wack-lives').innerText = state.lives;
                document.getElementById('wack-bombs').innerText = state.bombs;
            }

            function spawnWave() {
                // Criar inimigos espalhados pelo mundo
                for (let i = 0; i < 15; i++) {
                    spawnEnemy();
                }
            }

            function spawnEnemy() {
                // Nasce longe do player
                let x = Math.random() * WORLD_WIDTH;
                if (Math.abs(x - state.player.worldX) < 400) x += 500;

                const types = ['lander', 'mutant', 'ufo'];
                const type = types[Math.floor(Math.random() * types.length)];

                state.enemies.push({
                    worldX: x,
                    y: Math.random() * (VIEW_HEIGHT - 100) + 20,
                    w: 30, h: 30,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 2,
                    type: type,
                    color: type === 'lander' ? '#32ff00' : (type === 'mutant' ? '#ff00ff' : '#ffaa00'),
                    angle: 0
                });
            }

            // Input Handling
            window.addEventListener('keydown', e => {
                state.keys[e.code] = true;
                if (e.code === 'Space') e.preventDefault();
                if (e.code === 'ShiftLeft' && state.playing) useSmartBomb();
            });
            window.addEventListener('keyup', e => state.keys[e.code] = false);

            function shoot() {

                const p = state.player;

                // Direção baseada na rotação 3D
                const dir = Math.cos(p.rotationY) >= 0 ? 1 : -1;

                state.bullets.push({
                    worldX: p.worldX + dir * 20,
                    y: p.y + 5,
                    vx: dir * 25,
                    life: 60,
                    color: Math.random() > 0.5 ? '#ffff00' : '#ffffff'
                });

                state.shake = 3;

                createParticles(
                    p.worldX + dir * 30,
                    p.y + 10,
                    3,
                    '#ffff00'
                );

                playPew();
            }

            function useSmartBomb() {
                if (state.bombs <= 0) return;
                state.bombs--;
                state.usedBomb = true;
                state.shake = 30; // Shake massivo

                // Destruir todos inimigos visíveis (e alguns fora)
                state.enemies.forEach(en => {
                    if (Math.abs(en.worldX - state.player.worldX) < 1500) {
                        createExplosion(en.worldX, en.y, 20, en.color);
                        en.dead = true;
                        state.score += 200;
                    }
                });
                state.enemies = state.enemies.filter(e => !e.dead);
                updateHUD();

                // Flash branco na tela
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
            }

            function createParticles(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    state.particles.push({
                        worldX: x, y: y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1.0,
                        color: color,
                        size: Math.random() * 4 + 2
                    });
                }
            }

            function createExplosion(x, y, count, color) {
                state.shake = 8;
                createParticles(x, y, count, color);
            }

            // --- GAME LOOP ---
            function update() {
                if (!state.playing) return;

                // Sistema de tiro com cooldown
                if (state.keys['Space']) {
                    const now = Date.now();
                    if (now - lastShotTime >= SHOOT_COOLDOWN) {
                        shoot();
                        lastShotTime = now;
                    }
                }

                // 1. Física do Jogador (Defender Style)
                if (state.keys['ArrowUp'] || state.keys['KeyW']) state.player.vy -= state.player.thrust;
                if (state.keys['ArrowDown'] || state.keys['KeyS']) state.player.vy += state.player.thrust;

                if (state.keys['ArrowLeft'] || state.keys['KeyA']) {
                    state.player.vx -= state.player.thrust;
                    state.player.targetRotationY = Math.PI; // 180°
                }

                if (state.keys['ArrowRight'] || state.keys['KeyD']) {
                    state.player.vx += state.player.thrust;
                    state.player.targetRotationY = 0; // 0°
                }

                // Interpolação suave do flip 3D
                const p = state.player;
                const diff = p.targetRotationY - p.rotationY;

                // Normalizar diferença para menor caminho
                let delta = ((diff + Math.PI) % (Math.PI * 2)) - Math.PI;

                // Velocidade do giro
                p.rotationY += delta * 0.15;

                // Fricção e Limite
                state.player.vx *= state.player.friction;
                state.player.vy *= state.player.friction;

                // Clamp velocidade máxima
                state.player.vx = Math.max(Math.min(state.player.vx, state.player.maxSpeed), -state.player.maxSpeed);
                state.player.vy = Math.max(Math.min(state.player.vy, 10), -10);

                // Aplicar movimento
                state.player.worldX += state.player.vx;
                state.player.y += state.player.vy;

                // Wrap World (Mundo Infinito)
                if (state.player.worldX < 0) state.player.worldX += WORLD_WIDTH;
                if (state.player.worldX > WORLD_WIDTH) state.player.worldX -= WORLD_WIDTH;

                // Limite Vertical
                if (state.player.y < 20) { state.player.y = 20; state.player.vy = 0; }
                if (state.player.y > VIEW_HEIGHT - 40) { state.player.y = VIEW_HEIGHT - 40; state.player.vy = -2; } // Bounce no chão

                // Câmera segue o jogador (centralizado)
                state.cameraX = state.player.worldX - VIEW_WIDTH / 2;

                // 2. Balas
                state.bullets.forEach(b => {
                    b.worldX += b.vx;
                    b.life--;
                    // Wrap balas
                    if (b.worldX < 0) b.worldX += WORLD_WIDTH;
                    if (b.worldX > WORLD_WIDTH) b.worldX -= WORLD_WIDTH;
                });
                state.bullets = state.bullets.filter(b => b.life > 0);

                // 3. Inimigos
                if (state.enemies.length < 5) spawnEnemy(); // Respawn contínuo

                state.enemies.forEach(en => {
                    // Comportamento simples de perseguição "Wacky"
                    en.angle += 0.1;

                    if (en.type === 'lander') {
                        en.worldX += en.vx;
                    } else if (en.type === 'mutant') {
                        // Mutante oscila e persegue
                        en.worldX += en.vx * 1.5;
                        en.y += Math.sin(en.angle) * 2;
                    } else {
                        // UFO teleporta ou move rápido
                        en.worldX += en.vx * 2;
                    }

                    // Wrap Inimigos
                    if (en.worldX < 0) en.worldX += WORLD_WIDTH;
                    if (en.worldX > WORLD_WIDTH) en.worldX -= WORLD_WIDTH;

                    // Colisões (Lógica simplificada para wrap-world é chata, vamos checar proximidade relativa)
                    // Bala x Inimigo
                    state.bullets.forEach(b => {
                        // Checar colisão considerando o wrap
                        let dx = Math.abs(b.worldX - en.worldX);
                        if (dx > WORLD_WIDTH / 2) dx = WORLD_WIDTH - dx; // Perto pela borda

                        if (dx < en.w && Math.abs(b.y - en.y) < en.h) {
                            en.dead = true;
                            b.life = 0;
                            state.score += 150;
                            createExplosion(en.worldX, en.y, 10, en.color);
                            updateHUD();
                            if (state.score >= 1000) {
                                unlockAchievement("wack_1000");
                            }
                        }
                    });

                    // Player x Inimigo
                    let pdx = Math.abs(state.player.worldX - en.worldX);
                    if (pdx > WORLD_WIDTH / 2) pdx = WORLD_WIDTH - pdx;

                    if (pdx < 30 && Math.abs(state.player.y - en.y) < 30) {
                        en.dead = true;
                        state.lives--;
                        state.shake = 20;
                        createExplosion(state.player.worldX, state.player.y, 50, '#ff0000');
                        updateHUD();
                        if (state.lives <= 0) gameOver();
                    }
                });
                state.enemies = state.enemies.filter(e => !e.dead);

                // 4. Partículas
                state.particles.forEach(p => {
                    p.worldX += p.vx;
                    p.y += p.vy;
                    p.life -= 0.05;
                });
                state.particles = state.particles.filter(p => p.life > 0);

                // Shake Decay
                if (state.shake > 0) state.shake *= 0.9;
                if (state.shake < 0.5) state.shake = 0;
            }

            // --- DRAWING ---
            function draw() {
                // Limpar Telas
                ctx.fillStyle = '#000000'; // Fundo do jogo
                ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);

                sCtx.fillStyle = '#000000'; // Fundo Scanner
                sCtx.fillRect(0, 0, 800, 40);

                // Screen Shake
                const shakeX = (Math.random() - 0.5) * state.shake;
                const shakeY = (Math.random() - 0.5) * state.shake;

                ctx.save();
                ctx.translate(shakeX, shakeY);

                // 1. Desenhar Fundo (Estrelas com Parallax)
                // Para desenhar fundo infinito, desenhamos com base na cameraX
                drawStars(ctx);
                drawTerrain(ctx);

                // 2. Desenhar Entidades (Considerando o Wrap)
                // A função drawRelative desenha o objeto se ele estiver visível na camera
                drawPlayer(ctx);

                state.enemies.forEach(en => drawRelative(ctx, en.worldX, en.y, () => drawEnemy(ctx, en)));
                state.bullets.forEach(b => drawRelative(ctx, b.worldX, b.y, () => drawBullet(ctx, b)));
                state.particles.forEach(p => drawRelative(ctx, p.worldX, p.y, () => drawParticle(ctx, p)));

                ctx.restore();

                // 3. Desenhar Scanner (Mini-mapa)
                drawScanner(sCtx);
            }

            // Helper: Desenha algo na tela convertendo WorldX para ScreenX
            // Lida com o problema do wrap-around (desenha duas vezes se estiver na borda)
            function drawRelative(context, worldX, y, drawFn) {
                // Calcula posição na tela
                let screenX = worldX - state.cameraX;

                // Ajuste wrap
                if (screenX < -VIEW_WIDTH) screenX += WORLD_WIDTH;
                if (screenX > WORLD_WIDTH - VIEW_WIDTH) screenX -= WORLD_WIDTH;

                // Desenhar principal
                if (screenX > -100 && screenX < VIEW_WIDTH + 100) {
                    context.save();
                    context.translate(screenX, y);
                    drawFn();
                    context.restore();
                }

                // Desenhar cópia para borda (Wrap visual suave)
                // Se a camera está perto do fim do mundo, desenhamos o começo do mundo logo depois
                // Essa lógica é complexa, vamos simplificar desenhando sempre offsets se perto das bordas
                let wrapOffset = 0;
                if (worldX < state.cameraX && (worldX + WORLD_WIDTH) - state.cameraX < VIEW_WIDTH) {
                    wrapOffset = WORLD_WIDTH;
                } else if (worldX > state.cameraX && worldX - WORLD_WIDTH - state.cameraX > -VIEW_WIDTH) {
                    wrapOffset = -WORLD_WIDTH;
                }

                if (wrapOffset !== 0) {
                    context.save();
                    context.translate(worldX + wrapOffset - state.cameraX, y);
                    drawFn();
                    context.restore();
                }
            }

            function drawStars(c) {
                c.fillStyle = '#ffffff';
                state.stars.forEach(s => {
                    let sx = s.x - state.cameraX * (s.s * 0.1); // Parallax
                    // Wrap visual das estrelas
                    sx = ((sx % VIEW_WIDTH) + VIEW_WIDTH) % VIEW_WIDTH;

                    c.globalAlpha = Math.random() * 0.5 + 0.5;
                    c.fillStyle = s.color;
                    c.fillRect(sx, s.y, s.s, s.s);
                });
                c.globalAlpha = 1.0;
            }

            function drawTerrain(c) {
                // Definimos as camadas: [parallax, fill, stroke, thickness, opacity, amplitudeMod]
                const layers = [
                    { p: 0.3, fill: '#0a001a', stroke: '#440066', width: 2, glow: false }, // Fundo profundo
                    { p: 0.6, fill: '#110022', stroke: '#ff00ff', width: 4, glow: true },  // Montanhas distantes
                    { p: 1.0, fill: '#1a002a', stroke: '#32ff00', width: 3, glow: true }   // Terreno principal
                ];

                layers.forEach(layer => {
                    drawTerrainLayer(c, layer);
                });
            }

            /**
             * Desenha uma camada específica com interpolação suave.
             */
            function drawTerrainLayer(c, config) {
                const { p, fill, stroke, width, glow } = config;
                const camX = state.cameraX * p;
                const step = 50; // Distância entre pontos definida no seu estado

                c.save();

                // Estilização básica
                c.fillStyle = fill;
                c.strokeStyle = stroke;
                c.lineWidth = width;
                c.lineJoin = 'round';

                // Efeito de brilho (Glow) opcional - Cuidado: pesado em resoluções altas
                if (glow) {
                    c.shadowBlur = 15;
                    c.shadowColor = stroke;
                }

                c.beginPath();

                // Cálculo de range visível com margem de segurança para o wrap
                const startIdx = Math.floor(camX / step) - 2;
                const endIdx = startIdx + Math.ceil(VIEW_WIDTH / step) + 4;

                let points = [];

                // Coleta e projeta os pontos visíveis
                for (let i = startIdx; i <= endIdx; i++) {
                    const x = i * step;
                    const worldX = ((x % WORLD_WIDTH) + WORLD_WIDTH) % WORLD_WIDTH;
                    const idx = Math.floor(worldX / step) % state.terrainY.length;

                    points.push({
                        x: x - camX,
                        y: state.terrainY[idx].y
                    });
                }

                // Desenha curvas de Bézier Quadrática para suavizar as quinas
                if (points.length > 0) {
                    c.moveTo(points[0].x, points[0].y);

                    for (let i = 0; i < points.length - 1; i++) {
                        const p0 = points[i];
                        const p1 = points[i + 1];

                        // Ponto de controle no meio do caminho para suavização perfeita
                        const midX = (p0.x + p1.x) / 2;
                        const midY = (p0.y + p1.y) / 2;

                        c.quadraticCurveTo(p0.x, p0.y, midX, midY);
                    }
                }

                // Fecha o polígono para o preenchimento (fill)
                c.lineTo(VIEW_WIDTH + 50, VIEW_HEIGHT + 100);
                c.lineTo(-50, VIEW_HEIGHT + 100);
                c.closePath();

                c.fill();

                // Desenha o stroke separadamente para evitar brilho na base do terreno
                c.stroke();

                c.restore();
            }

            function drawPlayer(c) {
                drawRelative(c, state.player.worldX, state.player.y, () => {
                    const facing = state.player.faceRight ? 1 : -1;
                    const time = Date.now() * 0.006;
                    const rotY = state.player.rotationY;

                    // Simulação 3D: escala baseada no cosseno
                    const scaleX3D = Math.cos(rotY);
                    const sideAmount = Math.abs(Math.sin(rotY));
                    const frontAmount = Math.abs(scaleX3D);

                    // Quando estiver “atrás” (passou de 90°), inverter desenho
                    const flipped = scaleX3D < 0 ? -1 : 1;

                    const speedStretch = 1 + Math.min(Math.abs(state.player.vx) * 0.05, 0.25);

                    c.save();
                    c.translate(20, 10);
                    c.scale(scaleX3D * speedStretch, 1 - (speedStretch - 1) * 0.5);

                    // === ESPESSURA 3D FAKE ===
                    if (sideAmount > 0.05) {
                        const thickness = 12 * sideAmount; // controla grossura

                        c.fillStyle = '#5a189a'; // cor mais escura da nave
                        c.globalAlpha = 0.9;

                        c.fillRect(
                            -thickness / 2,
                            -15,
                            thickness,
                            30
                        );

                        c.globalAlpha = 1;
                    }

                    // --- SOMBRA ---
                    c.fillStyle = 'rgba(0,0,0,0.4)';
                    c.beginPath();
                    c.ellipse(0, 20, 18, 6, 0, 0, Math.PI * 2);
                    c.fill();

                    // === SE ESTIVER DE FRENTE (≈ 90°) ===
                    if (frontAmount < 0.15) {

                        c.shadowBlur = 10;
                        c.shadowColor = '#FF00FF';

                        c.fillStyle = '#8A2BE2';
                        c.strokeStyle = '#FF00FF';
                        c.lineWidth = 4;

                        // Retângulo frontal (face do prisma)
                        c.beginPath();
                        c.roundRect(-12, -18, 24, 36, 8);
                        c.fill();
                        c.stroke();

                        c.shadowBlur = 0;

                        c.restore();
                        return; // <-- IMPORTANTE: não desenha o resto
                    }

                    // --- CORPO PRINCIPAL (Efeito Neon no contorno) ---
                    c.fillStyle = '#8A2BE2';
                    c.strokeStyle = '#FF00FF'; // Magenta Neon
                    c.lineWidth = 4;
                    c.lineJoin = 'round';

                    // Brilho Neon Suave
                    c.shadowBlur = 10;
                    c.shadowColor = '#FF00FF';

                    c.beginPath();
                    c.moveTo(24, 0);
                    c.lineTo(-10, -18);
                    c.quadraticCurveTo(-18, 0, -10, 18);
                    c.closePath();
                    c.fill();
                    c.stroke();

                    c.shadowBlur = 0; // Reseta para não borrar tudo

                    // --- BARRIGA SLIME ---
                    c.fillStyle = 'rgba(173,255,47,0.5)';
                    c.beginPath();
                    c.ellipse(2, 4, 8, 6, 0, 0, Math.PI * 2);
                    c.fill();

                    // --- OLHO ---
                    const blink = Math.sin(time * 2) > 0.95 ? 1 : 0;
                    c.fillStyle = '#FFF';
                    c.beginPath();
                    c.ellipse(8, -2, 5, 6 - blink * 5, 0, 0, Math.PI * 2);
                    c.fill();

                    c.fillStyle = '#000';
                    c.beginPath();
                    c.arc(10, -2, 2.5, 0, Math.PI * 2);
                    c.fill();

                    // --- ANTENA ---
                    c.strokeStyle = '#FF6A00';
                    c.lineWidth = 3;
                    c.beginPath();
                    c.moveTo(-2, -10);
                    c.quadraticCurveTo(-8, -25 + Math.sin(time) * 5, -14, -22);
                    c.stroke();

                    // Ponta da antena com brilho
                    c.shadowBlur = 15;
                    c.shadowColor = '#ADFF2F';
                    c.fillStyle = '#ADFF2F';
                    c.beginPath();
                    c.arc(-14, -22, 4, 0, Math.PI * 2);
                    c.fill();
                    c.shadowBlur = 0;

                    // --- MOTOR SLIME ---
                    const thrustPulse = 8 + Math.sin(time * 8) * 4 + Math.abs(state.player.vx) * 2;
                    c.fillStyle = '#32CD32';
                    c.shadowBlur = 12;
                    c.shadowColor = '#00FF00';
                    c.beginPath();
                    c.moveTo(-10, -8);
                    c.bezierCurveTo(-20 - thrustPulse, -5, -20 - thrustPulse, 5, -10, 8);
                    c.closePath();
                    c.fill();

                    // Bolhas
                    c.shadowBlur = 5;
                    c.fillStyle = '#ADFF2F';
                    for (let i = 0; i < 3; i++) {
                        const offset = i * 4;
                        const bx = -15 - Math.sin(time * 3 + i) * 6;
                        const by = Math.sin(time * 4 + offset) * 6;
                        c.beginPath();
                        c.arc(bx, by, 2.5, 0, Math.PI * 2);
                        c.fill();
                    }

                    c.restore();
                });
            }

            function drawEnemy(c, en) {
                const time = Date.now() / 1000;
                // Wobble mais errático e caótico
                const wobble = Math.sin(time * 12 + (en.x || 0)) * 3;
                const jitter = (Math.random() - 0.5) * 2;

                c.save();
                // Adiciona uma leve trepidação constante
                c.translate(jitter, jitter);

                if (en.type === 'lander') {
                    c.fillStyle = '#CCFF00';
                    c.strokeStyle = '#000';
                    c.lineWidth = 3;

                    c.shadowBlur = 12;
                    c.shadowColor = '#CCFF00';

                    c.beginPath();
                    // Forma mais "derretida" e assimétrica
                    c.moveTo(-8 + wobble, 0);
                    c.lineTo(en.w + 8, -4);
                    c.quadraticCurveTo(en.w / 2 + (Math.cos(time * 5) * 5), en.h + 15, -15, en.h - 2);
                    c.closePath();
                    c.fill();
                    c.stroke();
                    c.shadowBlur = 0;

                    // Olho arregalado e assimétrico
                    const eyeSize = 14 + Math.sin(time * 8) * 3;
                    c.fillStyle = 'white';
                    c.beginPath();
                    c.ellipse(en.w / 2, 6, eyeSize, eyeSize * 0.7, 0.3 + (Math.sin(time) * 0.1), 0, Math.PI * 2);
                    c.fill();
                    c.stroke();

                    // Pupila minúscula e frenética (estilo cartoon louco)
                    c.fillStyle = 'black';
                    const pupilaOffset = Math.sin(time * 20) * 2;
                    c.beginPath();
                    c.arc(en.w / 2 + pupilaOffset, 6 + (Math.cos(time * 15) * 2), 3, 0, Math.PI * 2);
                    c.fill();

                } else if (en.type === 'mutant') {
                    c.fillStyle = '#9400D3';
                    c.strokeStyle = '#00FF00';
                    c.lineWidth = 4;

                    c.shadowBlur = 15;
                    c.shadowColor = '#00FF00';

                    c.beginPath();
                    // Spikes mais longos e variados
                    for (let i = 0; i < 10; i++) {
                        const angle = (i / 10) * Math.PI * 2;
                        const wave = i % 2 === 0 ? 10 : 20;
                        const dist = wave + Math.sin(time * 12 + i) * 8;
                        const px = 15 + Math.cos(angle) * dist;
                        const py = 15 + Math.sin(angle) * dist;
                        if (i === 0) c.moveTo(px, py);
                        else c.lineTo(px, py);
                    }
                    c.closePath();
                    c.fill();
                    c.stroke();
                    c.shadowBlur = 0;

                    // Sorriso torto com dentes desalinhados
                    c.strokeStyle = 'white';
                    c.lineWidth = 3;
                    c.beginPath();
                    c.moveTo(5, 15);
                    c.quadraticCurveTo(15, 35 + wobble, 25, 15);
                    c.stroke();

                    // Dentes "podres" saltando
                    c.fillStyle = '#FFFFCC';
                    c.fillRect(10 + jitter, 22, 5, 7);
                    c.fillRect(18 - jitter, 21, 4, 6);

                } else {
                    // UFO/Bizarro
                    c.fillStyle = '#00FFFF';
                    c.strokeStyle = '#FF4500';
                    c.lineWidth = 3;

                    c.shadowBlur = 10;
                    c.shadowColor = '#00FFFF';

                    // Corpo que "pulsa" como uma gelatina
                    c.beginPath();
                    const pulse = Math.sin(time * 10) * 4;
                    c.moveTo(0 - pulse, 15);
                    c.bezierCurveTo(0, 5 - pulse, 30, 5 - pulse, 30 + pulse, 15);
                    c.bezierCurveTo(35 + pulse, 25 + pulse, -5 - pulse, 25 + pulse, 0 - pulse, 15);
                    c.fill();
                    c.stroke();

                    // Cúpula rosa choque neon
                    c.shadowBlur = 20;
                    c.shadowColor = '#FF1493';
                    c.fillStyle = 'rgba(255, 20, 147, 0.9)';
                    c.beginPath();
                    c.ellipse(15, 10, 12 + (wobble * 0.5), 9, Math.sin(time * 2) * 0.2, Math.PI, 0);
                    c.fill();
                    c.stroke();
                    c.shadowBlur = 0;

                    // Antena balançando violentamente
                    c.lineWidth = 2;
                    const antX = 15 + Math.sin(time * 20) * 15;
                    const antY = -15 + Math.cos(time * 20) * 2;
                    c.beginPath();
                    c.moveTo(15, 5);
                    c.lineTo(antX, antY);
                    c.stroke();

                    // Orbe da antena piscando
                    c.fillStyle = (Math.floor(time * 10) % 2 === 0) ? '#FFFF00' : '#FF0000';
                    c.beginPath();
                    c.arc(antX, antY, 5, 0, Math.PI * 2);
                    c.fill();
                    c.stroke();
                }

                c.restore();
            }

            function drawBullet(c, b) {
                const time = Date.now() * 0.02;

                c.save();

                // === Glow externo forte ===
                c.shadowBlur = 25;
                c.shadowColor = b.color;

                // === Corpo principal (forma torta orgânica) ===
                c.fillStyle = b.color;
                c.beginPath();
                c.moveTo(0, 2);
                c.quadraticCurveTo(10, -4 + Math.sin(time) * 2, 22, 2);
                c.quadraticCurveTo(30, 4, 22, 6);
                c.quadraticCurveTo(10, 10 + Math.cos(time) * 2, 0, 6);
                c.closePath();
                c.fill();

                // === Núcleo branco energético ===
                c.shadowBlur = 10;
                c.fillStyle = "#FFFFFF";
                c.beginPath();
                c.ellipse(15, 4, 6, 2, 0, 0, Math.PI * 2);
                c.fill();

                // === Slime drip atrás ===
                c.shadowBlur = 15;
                c.fillStyle = b.color;

                c.beginPath();
                c.arc(-5 + Math.sin(time * 2) * 2, 4, 4, 0, Math.PI * 2);
                c.fill();

                c.beginPath();
                c.arc(-10 + Math.cos(time * 1.5) * 2, 5, 3, 0, Math.PI * 2);
                c.fill();

                c.restore();
            }

            function drawParticle(c, p) {
                c.fillStyle = p.color;
                c.globalAlpha = p.life;
                c.beginPath();
                c.arc(0, 0, p.size, 0, Math.PI * 2);
                c.fill();
                c.globalAlpha = 1.0;
            }

            function drawScanner(c) {
                // Escala: 4000px mundo -> 800px scanner (1:5)
                const scale = 800 / WORLD_WIDTH;

                // Limpar
                c.clearRect(0, 0, 800, 40);

                // Desenhar área visível (Frame)
                let camX = state.cameraX * scale;
                let camW = VIEW_WIDTH * scale;

                c.strokeStyle = '#ffffff';
                c.lineWidth = 1;
                c.strokeRect(camX, 2, camW, 36);
                // Se frame der wrap
                if (camX + camW > 800) {
                    c.strokeRect(camX - 800, 2, camW, 36);
                }
                if (camX < 0) {
                    c.strokeRect(camX + 800, 2, camW, 36);
                }

                // Desenhar Inimigos (Pontos)
                state.enemies.forEach(en => {
                    c.fillStyle = en.color;
                    c.fillRect(en.worldX * scale, en.y / 10 + 5, 4, 4);
                });

                // Desenhar Player
                c.fillStyle = '#ffff00'; // Amarelo destaque
                c.fillRect(state.player.worldX * scale, state.player.y / 10 + 5, 6, 6);
            }

            function gameLoop() {

                document.querySelector('#wack-menu h2').innerText = `FINAL SCORE: ${state.score}`;
            }

            // Start screen draw inicial
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, 800, 400);
            // Grid retro
            ctx.strokeStyle = "#220044";
            for (let i = 0; i < 800; i += 40) { ctx.moveTo(i, 0); ctx.lineTo(i, 400); }
            for (let i = 0; i < 400; i += 40) { ctx.moveTo(0, i); ctx.lineTo(800, i); }
            ctx.stroke();
        }

        // --- MOTOR DE ÁUDIO (Web Audio API) ---
        const AudioEngine = (() => {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            function playTone(freq, type, duration, volume) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = type; // 'sine', 'square', 'sawtooth', 'triangle'
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            }

            return {

                playAchievement: () => {
                    const now = audioCtx.currentTime;

                    function note(freq, delay) {
                        const osc1 = audioCtx.createOscillator();
                        const osc2 = audioCtx.createOscillator(); // harmônico leve
                        const gain = audioCtx.createGain();

                        osc1.type = 'sine';
                        osc2.type = 'triangle';

                        osc1.frequency.setValueAtTime(freq, now + delay);
                        osc2.frequency.setValueAtTime(freq * 2, now + delay); // harmônico 1 oitava acima

                        // envelope mais suave
                        gain.gain.setValueAtTime(0.0001, now + delay);
                        gain.gain.linearRampToValueAtTime(0.18, now + delay + 0.05); // ataque rápido
                        gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.4);

                        osc1.connect(gain);
                        osc2.connect(gain);
                        gain.connect(audioCtx.destination);

                        osc1.start(now + delay);
                        osc2.start(now + delay);

                        osc1.stop(now + delay + 0.4);
                        osc2.stop(now + delay + 0.4);
                    }

                    note(329.63, 0);     // E
                    note(392.00, 0.45);  // G
                    note(261.63, 0.70);  // C4
                },

                playJump: () => playTone(400, 'triangle', 0.2, 0.1),
                playPoint: () => {
                    playTone(600, 'sine', 0.1, 0.1);
                    setTimeout(() => playTone(900, 'sine', 0.1, 0.1), 50);
                },
                playHit: () => {
                    playTone(200, 'sawtooth', 0.3, 0.1);
                    playTone(100, 'sawtooth', 0.5, 0.1);
                },
                resume: () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }
            };
        })();

        function openApp(appId) {

            const totalOpen = Object.keys(windowState).length + 1;

            if (totalOpen === 5) unlockAchievement("open_app");

            win.className = 'window';
            win.id = winId;
            win.style.left = (50 + Math.random() * 50) + 'px';

            taskIcon.innerHTML = `<i class="fas ${app.icon} ${app.color}"></i>`;

            taskbarApps.appendChild(taskIcon);

            // anima entrada
            requestAnimationFrame(() => taskIcon.classList.add('show'));

            windowState[winId] = {
                app,
                minimized: false,
                taskIcon
            };

            // clicar no ícone restaura / foca
            taskIcon.onclick = () => {

        let metroBokehInterval = null;

        function startMetroBokeh() {
            stopMetroBokeh(); // evita duplicar

            const player = document.getElementById("musicPlayer");

            metroBokehInterval = setInterval(() => {
                // só cria se estiver na skin metro
                if (!player.classList.contains("skin-metro")) return;

                const bokeh = document.createElement("div");
                bokeh.className = "metro-bokeh";

                // tamanhos pequenos, diferença sutil
                const size = 12 + Math.random() * 10; // 12px → 22px
                bokeh.style.width = size + "px";
                bokeh.style.height = size + "px";

                // posição aleatória
                bokeh.style.left = Math.random() * 100 + "%";
                bokeh.style.top = 40 + Math.random() * 40 + "%";

                // cores Frutiger Metro
                const colors = [
                    "rgba(0,255,255,0.6)",   // cyan
                    "rgba(255,0,255,0.5)",   // magenta
                    "rgba(0,255,180,0.5)",   // verde água
                    "rgba(255,255,0,0.4)"    // amarelo suave
                ];
                bokeh.style.background = colors[Math.floor(Math.random() * colors.length)];

                // duração suave (nem rápido, nem lento)
                const duration = 6 + Math.random() * 4; // 6s → 10s
                bokeh.style.animationDuration = duration + "s";

                player.appendChild(bokeh);

                // remove depois da animação
                setTimeout(() => bokeh.remove(), duration * 1000);

            }, 700); // frequência baixa (orgânico)
        }

            const win = document.getElementById(id);

            const player = win.querySelector('.music-player');

            if (isMax) {
                win.style.width = '';
                win.style.height = '';
                win.style.top = win.dataset.prevTop || '50px';
                win.style.left = win.dataset.prevLeft || '50px';
                win.dataset.maximized = 'false';

                if (player) {
                    player.style.width = '';
                    player.style.height = '';
                    player.style.borderRadius = '';
                    player.classList.remove('is-maximized');
                }
            } else {
                win.dataset.prevTop = win.style.top;
                win.dataset.prevLeft = win.style.left;

                win.style.width = '100%';
                win.style.height = 'calc(100vh - 45px)';
                win.style.top = '0';
                win.style.left = '0';
                win.dataset.maximized = 'true';

                if (player) {

        function initPaint(winId) {
            const win = document.getElementById(winId);
            if (!win) return;

            const canvas = win.querySelector(`#cvs-${winId}`);
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            // Estado do App
            let tool = 'pen';
            let color = '#000000';
            let size = 5;
            let drawing = false;
            let startX = 0, startY = 0;

            // Histórico para Undo
            let history = [];
            const maxHistory = 20;

            // Elementos da UI
            const sizeInput = win.querySelector(`#size-${winId}`);
            const colorPreview = win.querySelector(`#current-color-${winId}`);
            const dotPreview = win.querySelector(`#dot-${winId}`);

            // Salvar estado inicial
            saveState();

            /* ---------------- AUXILIARES ---------------- */

            function saveState() {
                if (history.length >= maxHistory) history.shift();
                history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            }

            function undo() {
                if (history.length > 1) {
                    history.pop(); // Remove estado atual
                    const previous = history[history.length - 1];
                    ctx.putImageData(previous, 0, 0);
                }
            }

            function updatePreview() {
                dotPreview.style.width = `${size}px`;
                dotPreview.style.height = `${size}px`;
                dotPreview.style.background = color;
            }

            /* ---------------- EVENTOS UI ---------------- */

            // Ferramentas
            win.querySelectorAll('.paint-btn').forEach(btn => {
                btn.onclick = () => {
                    win.querySelectorAll('.paint-btn').forEach(b => b.classList.remove('active', 'bg-gray-300'));
                    btn.classList.add('active', 'bg-gray-300');
                    tool = btn.dataset.tool;
                };
            });

            // Paleta
            win.querySelector(`#palette-${winId}`).onclick = e => {
                const target = e.target.closest('.paint-color');
                if (target) {
                    color = target.dataset.color;
                    colorPreview.style.background = color;
                    updatePreview();
                }
            };

            // Tamanho
            sizeInput.oninput = () => {
                size = parseInt(sizeInput.value);
                updatePreview();
            };

            // Botões de Menu
            win.querySelector(`#btn-undo-${winId}`).onclick = undo;
            win.querySelector(`#btn-clear-${winId}`).onclick = () => {
                saveState();
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            };
            win.querySelector(`#btn-download-${winId}`).onclick = () => {
                const link = document.createElement('a');
                link.download = `paint-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            /* ---------------- ATALHOS TECLADO ---------------- */
            const handleKeyDown = (e) => {
                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
                if (e.key === 'p') win.querySelector('[data-tool="pen"]').click();
                if (e.key === 'e') win.querySelector('[data-tool="eraser"]').click();
                if (e.key === 'f') win.querySelector('[data-tool="fill"]').click();
                if (e.key === 'r') win.querySelector('[data-tool="rect"]').click();
                if (e.key === 'c') win.querySelector('[data-tool="circle"]').click();
            };
            window.addEventListener('keydown', handleKeyDown);

            /* ---------------- LÓGICA DO CANVAS ---------------- */
            let snapshot = null;

            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - r.left) * (canvas.width / r.width),
                    y: (e.clientY - r.top) * (canvas.height / r.height)
                };
            };

            canvas.onmousedown = e => {
                drawing = true;
                const pos = getPos(e);
                startX = pos.x;
                startY = pos.y;

                unlockAchievement("paint_artist");

                saveState(); // Salva antes de começar a alteração

                if (tool === 'fill') {
                    floodFill(Math.floor(startX), Math.floor(startY));
                    drawing = false;
                    return;
                }

                snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

                ctx.lineWidth = size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = color;
                ctx.fillStyle = color;

                if (tool === 'pen') {
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                }
            };

            canvas.onmousemove = e => {
                if (!drawing) return;
                const pos = getPos(e);
                const x = pos.x;
                const y = pos.y;

                if (tool === 'pen') {
                    ctx.lineTo(x, y);
                    ctx.stroke();
                }
                else if (tool === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.beginPath();
                    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                }
                else if (tool === 'rect' || tool === 'circle') {
                    ctx.putImageData(snapshot, 0, 0);
                    const w = x - startX;
                    const h = y - startY;

                    if (tool === 'rect') {
                        ctx.strokeRect(startX, startY, w, h);
                    } else {
                        ctx.beginPath();
                        ctx.ellipse(startX + w / 2, startY + h / 2, Math.abs(w / 2), Math.abs(h / 2), 0, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
            };

            canvas.onmouseup = () => {
                if (drawing && tool === 'pen') ctx.closePath();
                drawing = false;
            };

            /* ---------------- FLOOD FILL (OTIMIZADO) ---------------- */
            function floodFill(startX, startY) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                const w = canvas.width;
                const h = canvas.height;

                const pos = (startY * w + startX) * 4;
                const targetR = data[pos], targetG = data[pos + 1], targetB = data[pos + 2], targetA = data[pos + 3];

                const fillColor = hexToRgb(color);
                if (targetR === fillColor[0] && targetG === fillColor[1] && targetB === fillColor[2]) return;

                const stack = [[startX, startY]];
                while (stack.length) {
                    const [x, y] = stack.pop();
                    const i = (y * w + x) * 4;

                    if (data[i] === targetR && data[i + 1] === targetG && data[i + 2] === targetB && data[i + 3] === targetA) {
                        data[i] = fillColor[0];
                        data[i + 1] = fillColor[1];
                        data[i + 2] = fillColor[2];
                        data[i + 3] = 255;

                        if (x > 0) stack.push([x - 1, y]);
                        if (x < w - 1) stack.push([x + 1, y]);
                        if (y > 0) stack.push([x, y - 1]);
                        if (y < h - 1) stack.push([x, y + 1]);
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            }

            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return [r, g, b];
            }
        }

            function drawBlock(x, y, value) {
                const s = SKINS[currentSkin];
                const color = s.colors[value];

                // ========= ARCADE NEON =========
                if (currentSkin === 'arcade') {

                    const pulse = 0.7 + Math.sin(Date.now() * 0.01) * 0.3;

                // ========= ICE =========
                else if (currentSkin === 'ice') {

                    grd.addColorStop(0, '#ffffff');
                    grd.addColorStop(0.3, color);
                    grd.addColorStop(1, '#0ea5e9');

                    context.fillStyle = grd;

                    context.strokeStyle = 'rgba(255,255,255,0.4)';
                    context.lineWidth = 0.05;
                    context.strokeRect(x, y, 1, 1);

                    // reflexo gelo
                    context.fillStyle = 'rgba(255,255,255,0.4)';
                    context.fillRect(x + 0.1, y + 0.1, 0.8, 0.1);
                }

                // ========= SUNSET =========
                else if (currentSkin === 'sunset') {

                    context.shadowColor = '#ff8800';
                    context.shadowBlur = 10;

                    const grd = context.createLinearGradient(x, y, x + 1, y + 1);
                    grd.addColorStop(0, color);
                    grd.addColorStop(1, '#3a0ca3');

                    context.fillStyle = grd;

                    context.shadowBlur = 0;

                    context.strokeStyle = 'rgba(255,255,255,0.5)';

                }

                if (currentSkin === 'matrix') {
                    context.fillStyle = 'rgba(0,255,0,0.02)';
                    context.fillRect(0, 0, canvas.width, canvas.height);
                }

                drawMatrix(arena, { x: 0, y: 0 });

                // 👇 desenha ghost antes da peça real
                drawGhost();

                // 👇 desenha peça real por cima
                drawMatrix(player.matrix, player.pos);
            }

            function drawNext() {
                const s = SKINS[currentSkin];

                nextContext.fillStyle = s.canvasBg;
                nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

                if (!nextPiece) return;

                const offsetX = 1;
                const offsetY = 1;

                nextPiece.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            drawBlockNext(x + offsetX, y + offsetY, value);
                        }
                    });
                });
            }

            function drawBlockNext(x, y, value) {
                const s = SKINS[currentSkin];
                const color = s.colors[value];

                nextContext.fillStyle = color;
                nextContext.fillRect(x, y, 1, 1);

                nextContext.strokeStyle = 'rgba(255,255,255,0.3)';
                nextContext.lineWidth = 0.05;
                nextContext.strokeRect(x, y, 1, 1);
            }

            function createPiece(type) {
                if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
                if (type === 'L') return [[0, 0, 7], [7, 7, 7], [0, 0, 0]];
                if (type === 'J') return [[6, 0, 0], [6, 6, 6], [0, 0, 0]];
                if (type === 'O') return [[2, 2], [2, 2]];
                if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
                if (type === 'S') return [[0, 4, 4], [4, 4, 0], [0, 0, 0]];
                if (type === 'T') return [[0, 3, 0], [3, 3, 3], [0, 0, 0]];
            }

            function collide(arena, player) {
                const [m, o] = [player.matrix, player.pos];
                for (let y = 0; y < m.length; ++y) {
                    for (let x = 0; x < m[y].length; ++x) {
                        if (m[y][x] !== 0 &&
                            (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                            return true;
                        }
                    }
                }
                return false;
            }

            function getGhostPosition() {
                const ghost = {
                    pos: { x: player.pos.x, y: player.pos.y },
                    matrix: player.matrix
                };

                while (!collide(arena, ghost)) {
                    ghost.pos.y++;
                }

                ghost.pos.y--; // volta 1 porque colidiu
                return ghost.pos;
            }

            function merge(arena, player) {
                player.matrix.forEach((row, y) => {
                    row.forEach((value, x) => {
                        if (value !== 0) {
                            arena[y + player.pos.y][x + player.pos.x] = value;
                        }
                    });
                });
            }

            function sweep() {
                let rowCount = 1;
                let linesClearedThisTurn = 0;

                outer: for (let y = arena.length - 1; y > 0; --y) {
                    for (let x = 0; x < arena[y].length; ++x) {
                        if (arena[y][x] === 0) continue outer;
                    }

                    const row = arena.splice(y, 1)[0].fill(0);
                    arena.unshift(row);
                    ++y;

                    player.score += rowCount * 10;
                    player.lines++;
                    linesClearedThisTurn++;
                    rowCount *= 2;

                    if (player.score >= 100) {
                        unlockAchievement("tetris_100");
                    }
                }

                // 🔥 TETRIS (4 linhas de uma vez)
                if (linesClearedThisTurn === 4) {
                    unlockAchievement("tetris_4_lines");
                }

                // 🔥 20 linhas totais
                if (player.lines >= 20) {
                    unlockAchievement("tetris_20_lines");
                }

                // 🔥 500 pontos
                if (player.score >= 500) {
                    unlockAchievement("tetris_500");
                }

                scoreEl.textContent = player.score;
                linesEl.textContent = player.lines;
            }

            function playerDrop() {
                player.pos.y++;

                if (collide(arena, player)) {
                    player.pos.y--;
                    merge(arena, player);

                    sweep();        // 🔥 LIMPA AS LINHAS PRIMEIRO
                    playerReset();  // 🔥 DEPOIS CRIA A NOVA PEÇA
                }

                dropCounter = 0;
            }

            function playerMove(dir) { player.pos.x += dir; if (collide(arena, player)) player.pos.x -= dir; }

            function playerReset() {
                const pieces = 'ILJOTSZ';

                if (!nextPiece) {
                    nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
                }

                player.matrix = nextPiece;
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);

                player.pos.y = 0;
                player.pos.x = (arena[0].length / 2 | 0) -
                    (player.matrix[0].length / 2 | 0);

                if (collide(arena, player)) {
                    arena.forEach(row => row.fill(0));
                    player.score = 0;
                    player.lines = 0;
                    scoreEl.textContent = 0;
                    linesEl.textContent = 0;
                }
            }

            function playerRotate(dir) {
                const pos = player.pos.x;
                let offset = 1;
                rotate(player.matrix, dir);
                while (collide(arena, player)) {
                    player.pos.x += offset;
                    offset = -(offset + (offset > 0 ? 1 : -1));
                    if (offset > player.matrix[0].length) {
                        rotate(player.matrix, -dir);
                        player.pos.x = pos;
                        return;
                    }
                }

            }

            function rotate(matrix, dir) {
                for (let y = 0; y < matrix.length; ++y) {
                    for (let x = 0; x < y; ++x) {
                        [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                    }
                }
                if (dir > 0) matrix.forEach(row => row.reverse());
                else matrix.reverse();
            }

            let dropCounter = 0;
            let dropInterval = 1000;
            let lastTime = 0;

            function update(time = 0) {
                const deltaTime = time - lastTime;
                lastTime = time;
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) playerDrop();
                draw();
                drawNext();
                requestAnimationFrame(update);
            }

            let nextPiece = null;

            const arena = createMatrix(10, 20);
            const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0, lines: 0 };

            document.addEventListener('keydown', event => {
                if (!canvas.closest('.window')) return;
                if (event.key === 'a' || event.key === 'ArrowLeft') playerMove(-1);
                else if (event.key === 'd' || event.key === 'ArrowRight') playerMove(1);
                else if (event.key === 's' || event.key === 'ArrowDown') playerDrop();
                else if (event.key === 'w' || event.key === 'ArrowUp') playerRotate(1);
                else if (event.key === 'q') playerRotate(-1);
            });

            playerReset();
            update();
        }

        // --- TIC TAC TOE ---
        function initTTT(winId) {
            tttGames[winId] = {
                board: Array(9).fill(null),
                turn: 'X',
                over: false,
                ai: true // ativa IA
            };

        function tttPlay(winId, idx, cell) {
            const game = tttGames[winId];
            if (!game || game.over) return;
            if (game.board[idx]) return;
            if (game.turn !== 'X') return;

            // Jogada do jogador
            game.board[idx] = 'X';
            cell.innerText = 'X';
            cell.classList.add('ttt-x');

            if (endTTT(winId)) return;

            game.turn = 'O';
            document.getElementById(`ttt-msg-${winId}`).innerText =
                'Vez do PC (O)';

            setTimeout(() => tttAI(winId), 450);
        }

        function tttCheckWinner(b) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            for (const [a, b1, c] of wins) {
                if (b[a] && b[a] === b[b1] && b[a] === b[c]) {
                    return b[a];
                }
            }
            return null;
        }

        function tttReset(winId) {
            const grid = document.getElementById(`ttt-grid-${winId}`);

            grid.querySelectorAll('.ttt-cell').forEach(c => {
                c.innerText = '';
                c.classList.remove('ttt-x', 'ttt-o');
            });

            initTTT(winId);
        }

        function tttAI(winId) {
            const game = tttGames[winId];
            if (!game || game.over) return;

            const available = game.board
                .map((v, i) => v === null ? i : null)
                .filter(v => v !== null);

            // 🎲 35% de chance de jogar totalmente aleatório
            const makeMistake = Math.random() < 0.3;

            let move;

            if (makeMistake) {
                move = available[Math.floor(Math.random() * available.length)];
            } else {
                move =
                    findWinningMove(game.board, 'O') ??
                    findWinningMove(game.board, 'X') ??
                    (game.board[4] === null ? 4 : null) ??
                    [0, 2, 6, 8].find(i => game.board[i] === null) ??
                    available[0];
            }

            if (move == null) return;

            game.board[move] = 'O';

            const cell = document.querySelectorAll(`#ttt-grid-${winId} .ttt-cell`)[move];
            cell.innerText = 'O';
            cell.classList.add('ttt-o');

            endTTT(winId);

            game.turn = 'X';
            document.getElementById(`ttt-msg-${winId}`).innerText =
                'Sua vez (X)';
        }

        function findWinningMove(board, player) {
            const wins = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8],
                [0, 3, 6], [1, 4, 7], [2, 5, 8],
                [0, 4, 8], [2, 4, 6]
            ];

            for (const [a, b, c] of wins) {
                const line = [board[a], board[b], board[c]];
                if (line.filter(v => v === player).length === 2 &&
                    line.includes(null)) {
                    return [a, b, c][line.indexOf(null)];
                }
            }
            return null;
        }

        function endTTT(winId) {
            const game = tttGames[winId];
            const winner = tttCheckWinner(game.board);

            if (winner) {

                if (winner === 'X') {
                    unlockAchievement("ttt_win");
                }

                document.getElementById(`ttt-msg-${winId}`).innerText =
                    winner === 'X'
                        ? '🎉 Você venceu!'
                        : '🤖 PC venceu!';

                game.over = true;
                return true;
            }

            if (game.board.every(c => c)) {
                document.getElementById(`ttt-msg-${winId}`).innerText =
                    '🤝 Empate!';
                game.over = true;
                return true;
            }

            return false;
        }
