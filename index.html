        /**
* Inicializa o CMD (Terminal) de forma aprimorada.
* Melhorias: Histórico de comandos (setas), cores no output,
* autoscroll inteligente e suporte a comandos vazios.
*/
        function initCMD(winId) {
            setTimeout(() => {
                const input = document.getElementById(`cmd-in-${winId}`);
                const output = document.getElementById(`cmd-out-${winId}`);
                if (!input || !output) return;

                // Estado do terminal
                const history = [];
                let historyIndex = -1;
                const prompt = "C:\\Users\\Admin> ";

                // Focar no input ao clicar no terminal
                output.parentElement.onclick = () => input.focus();

                input.addEventListener('keydown', (e) => {
                    // Histórico de comandos (Seta para cima e para baixo)
                    if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        if (history.length > 0 && historyIndex < history.length - 1) {
                            historyIndex++;
                            input.value = history[history.length - 1 - historyIndex];
                        }
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        if (historyIndex > 0) {
                            historyIndex--;
                            input.value = history[history.length - 1 - historyIndex];
                        } else {
                            historyIndex = -1;
                            input.value = "";
                        }
                    }

                    // Execução de comandos
                    if (e.key === 'Enter') {
                        const fullCmd = input.value;
                        const cmdClean = fullCmd.trim().toLowerCase();

                        // Adiciona ao histórico se não estiver vazio
                        if (fullCmd.trim() !== "") {
                            history.push(fullCmd);
                            historyIndex = -1;
                        }

                        // Eco do comando no output
                        output.innerHTML += `<div style="color: #fff;">${prompt}${fullCmd}</div>`;

                        let response = "";

                        // Lógica de conquistas (se existir a função global)
                        if (typeof unlockAchievement === 'function') {
                            unlockAchievement("cmd_user");
                        }

                        // Processador de comandos
                        if (cmdClean === 'help') {
                            response = "Comandos disponíveis:<br>" +
                                " - <span style='color: #0f0'>help</span>: Mostra esta lista<br>" +
                                " - <span style='color: #0f0'>date</span>: Exibe a data e hora atual<br>" +
                                " - <span style='color: #0f0'>cls</span>: Limpa a tela<br>" +
                                " - <span style='color: #0f0'>ver</span>: Versão do sistema<br>" +
                                " - <span style='color: #0f0'>echo [texto]</span>: Repete o texto digitado";
                        }
                        else if (cmdClean === 'date') {
                            response = new Date().toLocaleString('pt-BR');
                        }
                        else if (cmdClean === 'cls') {
                            output.innerHTML = "";
                            response = "";
                        }
                        else if (cmdClean === 'ver') {
                            response = "Glossows XP Professional [Versão 3.0.40]";
                        }
                        else if (cmdClean.startsWith('echo ')) {
                            response = fullCmd.substring(5);
                        }
                        else if (cmdClean === '') {
                            response = "";
                        }
                        else {
                            response = `<span style="color: #ff5555;">'${cmdClean.split(' ')[0]}' não é reconhecido como um comando interno ou externo, um programa operável ou um arquivo em lotes.</span>`;
                        }

                        // Exibe a resposta
                        if (response) {
                            output.innerHTML += `<div>${response}</div><br>`;
                        } else if (cmdClean !== 'cls') {
                            output.innerHTML += `<br>`;
                        }

                        // Limpa e rola para o fim
                        input.value = '';
                        const container = output.parentElement;
                        container.scrollTop = container.scrollHeight;
                    }
                });
            }, 100);
        }

        /**
* Inicializa o jogo Snake de forma otimizada.
* Melhorias: Gerenciamento de eventos robusto, prevenção de bug de direção rápida,
* limpeza de intervalos antigos e uso de IDs únicos.
*/
        function initSnake(winId) {
            // Aguarda um ciclo para garantir que o DOM está pronto
            setTimeout(() => {
                const canvas = document.getElementById(`snake-${winId}`);
                if (!canvas) return;

                const ctx = canvas.getContext('2d');
                const box = 20;

                // Estado inicial
                let snake = [{ x: 5 * box, y: 5 * box }];
                let score = 0;
                let d = null;
                let nextD = null; // Buffer para evitar giro de 180 graus rápido demais
                let gameOver = false;
                let gameLoop = null;

                // Gera comida garantindo que não nasça em cima da cobra
                function generateFood() {
                    let newFood;
                    while (true) {
                        newFood = {
                            x: Math.floor(Math.random() * (canvas.width / box)) * box,
                            y: Math.floor(Math.random() * (canvas.height / box)) * box
                        };
                        // Verifica se a comida nasceu dentro da cobra
                        const collision = snake.some(seg => seg.x === newFood.x && seg.y === newFood.y);
                        if (!collision) break;
                    }
                    return newFood;
                }

                let food = generateFood();

                // Gerenciador de teclas
                const handleKeyDown = (event) => {
                    const keys = { 37: "LEFT", 38: "UP", 39: "RIGHT", 40: "DOWN" };
                    const key = event.keyCode;

                    if (keys[key]) {
                        event.preventDefault();
                        const requestedDir = keys[key];

                        // Impede virar 180 graus (ex: ir para esquerda enquanto move para direita)
                        if (requestedDir === "LEFT" && d !== "RIGHT") nextD = "LEFT";
                        else if (requestedDir === "UP" && d !== "DOWN") nextD = "UP";
                        else if (requestedDir === "RIGHT" && d !== "LEFT") nextD = "RIGHT";
                        else if (requestedDir === "DOWN" && d !== "UP") nextD = "DOWN";
                    }
                };

                // Adiciona o listener e retorna uma função de limpeza
                document.addEventListener("keydown", handleKeyDown);

                function draw() {
                    if (gameOver) return;

                    // Atualiza direção com o buffer de input
                    if (nextD) d = nextD;

                    // --- Fundo com grade sutil ---
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#0b3f3d"; // teal profundo
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const cols = canvas.width / box;
                    const rows = canvas.height / box;
                    ctx.strokeStyle = "rgba(255,255,255,0.03)";
                    ctx.lineWidth = 0.5;
                    for (let c = 0; c <= cols; c++) {
                        ctx.beginPath();
                        ctx.moveTo(c * box, 0);
                        ctx.lineTo(c * box, canvas.height);
                        ctx.stroke();
                    }
                    for (let r = 0; r <= rows; r++) {
                        ctx.beginPath();
                        ctx.moveTo(0, r * box);
                        ctx.lineTo(canvas.width, r * box);
                        ctx.stroke();
                    }

                    // --- Comida com pulso animado ---
                    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200); // 0..1
                    const foodRadius = (box / 2.5) + pulse * 2;
                    const cx = food.x + box / 2;
                    const cy = food.y + box / 2;

                    // Halo externo
                    ctx.beginPath();
                    ctx.arc(cx, cy, foodRadius + 4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 50, 50, ${0.08 + pulse * 0.12})`;
                    ctx.fill();

                    // Sombra
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = "#ff3333";

                    // Gradiente radial da comida
                    const foodGrad = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, foodRadius);
                    foodGrad.addColorStop(0, "#ffcccc");
                    foodGrad.addColorStop(0.5, "#ff3333");
                    foodGrad.addColorStop(1, "#7a0000");
                    ctx.beginPath();
                    ctx.arc(cx, cy, foodRadius, 0, Math.PI * 2);
                    ctx.fillStyle = foodGrad;
                    ctx.fill();

                    // Brilho especular
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(cx - foodRadius * 0.3, cy - foodRadius * 0.3, foodRadius * 0.25, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(255,255,255,0.35)";
                    ctx.fill();

                    // --- Cobra ---
                    const len = snake.length;
                    snake.forEach((seg, i) => {
                        const isHead = i === 0;
                        const t = i / Math.max(len - 1, 1); // 0 (cabeça) → 1 (cauda)

                        // Tamanho levemente decrescente em direção à cauda
                        const shrink = isHead ? 0 : Math.min(i * 0.3, 2);
                        const x = seg.x + 1 + shrink / 2;
                        const y = seg.y + 1 + shrink / 2;
                        const size = box - 2 - shrink;

                        // Gradiente: cabeça mais clara, cauda mais escura
                        const topColor = isHead ? "#c8ffc8" : `hsl(120, 80%, ${60 - t * 25}%)`;
                        const botColor = isHead ? "#2db82d" : `hsl(120, 70%, ${30 - t * 10}%)`;

                        const grad = ctx.createLinearGradient(seg.x, seg.y, seg.x, seg.y + box);
                        grad.addColorStop(0, topColor);
                        grad.addColorStop(1, botColor);

                        // Brilho suave na cabeça
                        if (isHead) {
                            ctx.shadowBlur = 12;
                            ctx.shadowColor = "#66ff66";
                        } else {
                            ctx.shadowBlur = 0;
                        }

                        ctx.fillStyle = grad;
                        ctx.beginPath();
                        const r = isHead ? 8 : 4;
                        if (ctx.roundRect) {
                            ctx.roundRect(x, y, size, size, r);
                        } else {
                            ctx.fillRect(x, y, size, size);
                        }
                        ctx.fill();

                        // Brilho no topo do segmento
                        const shineGrad = ctx.createLinearGradient(x, y, x, y + size * 0.5);
                        shineGrad.addColorStop(0, "rgba(255,255,255,0.18)");
                        shineGrad.addColorStop(1, "rgba(255,255,255,0)");
                        ctx.fillStyle = shineGrad;
                        ctx.beginPath();
                        if (ctx.roundRect) {
                            ctx.roundRect(x, y, size, size * 0.5, [r, r, 0, 0]);
                        } else {
                            ctx.fillRect(x, y, size, size * 0.5);
                        }
                        ctx.fill();

                        ctx.shadowBlur = 0;

                        // --- Olhos na cabeça, posicionados pela direção ---
                        if (isHead && d) {
                            const eyeOffset = 4;
                            const eyeSize = 3.5;
                            const pupilSize = 2;

                            let eye1, eye2;
                            if (d === "RIGHT") { eye1 = { x: seg.x + box - eyeOffset - eyeSize, y: seg.y + eyeOffset }; eye2 = { x: seg.x + box - eyeOffset - eyeSize, y: seg.y + box - eyeOffset - eyeSize }; }
                            else if (d === "LEFT") { eye1 = { x: seg.x + eyeOffset, y: seg.y + eyeOffset }; eye2 = { x: seg.x + eyeOffset, y: seg.y + box - eyeOffset - eyeSize }; }
                            else if (d === "UP") { eye1 = { x: seg.x + eyeOffset, y: seg.y + eyeOffset }; eye2 = { x: seg.x + box - eyeOffset - eyeSize, y: seg.y + eyeOffset }; }
                            else { eye1 = { x: seg.x + eyeOffset, y: seg.y + box - eyeOffset - eyeSize }; eye2 = { x: seg.x + box - eyeOffset - eyeSize, y: seg.y + box - eyeOffset - eyeSize }; }

                            [eye1, eye2].forEach(eye => {
                                // Branco do olho
                                ctx.fillStyle = "white";
                                ctx.beginPath();
                                ctx.arc(eye.x + eyeSize / 2, eye.y + eyeSize / 2, eyeSize / 2, 0, Math.PI * 2);
                                ctx.fill();
                                // Pupila
                                ctx.fillStyle = "#111";
                                ctx.beginPath();
                                ctx.arc(eye.x + eyeSize / 2, eye.y + eyeSize / 2, pupilSize / 2, 0, Math.PI * 2);
                                ctx.fill();
                            });
                        }
                    });

                    // --- Lógica de movimento ---
                    if (!d) return;

                    let headX = snake[0].x;
                    let headY = snake[0].y;
                    if (d === "LEFT") headX -= box;
                    if (d === "UP") headY -= box;
                    if (d === "RIGHT") headX += box;
                    if (d === "DOWN") headY += box;

                    // Colisão com parede
                    if (headX < 0 || headY < 0 || headX >= canvas.width || headY >= canvas.height) return;

                    // Colisão com corpo
                    if (snake.some((seg, i) => i !== 0 && seg.x === headX && seg.y === headY)) {
                        endGame();
                        return;
                    }

                    // Comer
                    if (headX === food.x && headY === food.y) {
                        score++;
                        if (typeof unlockAchievement === "function" && score === 10) unlockAchievement("snake_10");
                        food = generateFood();
                    } else {
                        snake.pop();
                    }

                    snake.unshift({ x: headX, y: headY });
                }

                function endGame() {
                    gameOver = true;
                    clearInterval(gameLoop);
                    document.removeEventListener("keydown", handleKeyDown);

                    ctx.fillStyle = "rgba(0,0,0,0.75)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 20px 'Segoe UI', Arial";
                    ctx.textAlign = "center";
                    ctx.fillText("FIM DE JOGO", canvas.width / 2, canvas.height / 2 - 10);

                    ctx.font = "14px Arial";
                    ctx.fillText(`Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
                }

                // Limpeza de instâncias anteriores se houver
                if (window[`snakeInterval_${winId}`]) {
                    clearInterval(window[`snakeInterval_${winId}`]);
                }

                // Inicia o loop
                gameLoop = setInterval(draw, 120); // 120ms é um equilíbrio melhor de velocidade
                window[`snakeInterval_${winId}`] = gameLoop;

            }, 100);
        }

        const minesGames = {};

        function initMines(winId) {
            const size = 8;
            const bombsCount = 10;
            const total = size * size;

            const bombs = new Set();
            while (bombs.size < bombsCount)
                bombs.add(Math.floor(Math.random() * total));

            minesGames[winId] = {
                bombs,
                revealed: new Set(),
                flags: new Set(),
                start: Date.now(),
                timer: setInterval(() => updateHUD(winId), 1000)
            };

            document.querySelectorAll(`#mines-${winId} button`)
                .forEach(b => {
                    b.className = "mine-btn";
                    b.innerHTML = "";
                    b.disabled = false;
                });

            updateHUD(winId);
        }

        function updateHUD(winId) {
            const g = minesGames[winId];
            if (!g) return;

            document.getElementById(`time-${winId}`)
                .innerText = String(
                    Math.floor((Date.now() - g.start) / 1000)
                ).padStart(3, "0");

            document.getElementById(`mines-count-${winId}`)
                .innerText = String(10 - g.flags.size).padStart(3, "0");
        }

        function toggleFlag(e, winId, i, btn) {
            e.preventDefault();
            const g = minesGames[winId];
            if (g.revealed.has(i)) return;

            btn.classList.toggle("flag");
            btn.classList.contains("flag")
                ? g.flags.add(i)
                : g.flags.delete(i);

            updateHUD(winId);
            checkWin(winId);
        }

        function revealMine(winId, i, btn) {
            const g = minesGames[winId];
            if (g.revealed.has(i) || g.flags.has(i)) return;

            g.revealed.add(i);
            btn.classList.add("revealed");

            if (g.bombs.has(i)) {
                lose(winId);
                return;
            }

            const n = countAdj(i, g.bombs);
            if (n) {
                btn.textContent = n;
                btn.style.color = [
                    "", "#1e40af", "#15803d", "#b91c1c",
                    "#1e3a8a", "#7c2d12", "#0f172a", "#000"
                ][n];
            } else expand(winId, i);

            checkWin(winId);
        }

        function countAdj(i, bombs) {
            const x = i % 8, y = (i / 8) | 0;
            let c = 0;
            for (let dx = -1; dx <= 1; dx++)
                for (let dy = -1; dy <= 1; dy++) {
                    if (!dx && !dy) continue;
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < 8 && ny >= 0 && ny < 8)
                        if (bombs.has(ny * 8 + nx)) c++;
                }
            return c;
        }

        function expand(winId, i) {
            const x = i % 8, y = (i / 8) | 0;
            for (let dx = -1; dx <= 1; dx++)
                for (let dy = -1; dy <= 1; dy++) {
                    const nx = x + dx, ny = y + dy;
                    if (nx >= 0 && nx < 8 && ny >= 0 && ny < 8) {
                        const ni = ny * 8 + nx;
                        const btn = document.querySelector(
                            `#mines-${winId} button[data-index="${ni}"]`);
                        if (btn) revealMine(winId, ni, btn);
                    }
                }
        }

        function lose(winId) {
            clearInterval(minesGames[winId].timer);
            minesGames[winId].bombs.forEach(i => {
                const b = document.querySelector(
                    `#mines-${winId} button[data-index="${i}"]`);
                if (b) b.classList.add("mine");
            });
            alert("💥 Game Over");
        }

        function checkWin(winId) {
            const g = minesGames[winId];
            if (g.revealed.size === 64 - g.bombs.size) {
                clearInterval(g.timer);
                alert("🎉 Vitória!");
                unlockAchievement("mines_win");
            }
        }

            audio.onloadedmetadata = () => updateDuration(winId);

            const audio = document.getElementById(`audio-${winId}`);
            const fill = document.getElementById(`progress-${winId}`);
            const thumb = document.getElementById(`thumb-${winId}`);
            const current = document.getElementById(`current-${winId}`);

            if (!audio.duration) return;

            const percent = (audio.currentTime / audio.duration) * 100;
            fill.style.width = percent + "%";

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, "0");
            return `${m}:${s}`;
        }

        function seekMusic(e, winId) {
            const audio = document.getElementById(`audio-${winId}`);
            const bar = e.currentTarget;

            const rect = bar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const percent = clickX / rect.width;

            audio.currentTime = percent * audio.duration;
            updateProgress(winId);
        }

        function enableThumbDrag(winId) {
            const bar = document.querySelector(`#thumb-${winId}`).parentElement;
            const thumb = document.getElementById(`thumb-${winId}`);
            const audio = document.getElementById(`audio-${winId}`);

            let dragging = false;

            thumb.addEventListener("mousedown", e => {
                dragging = true;
                e.preventDefault();
            });

            document.addEventListener("mousemove", e => {
                if (!dragging) return;

                const rect = bar.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(0, Math.min(x, rect.width));

                const percent = x / rect.width;
                audio.currentTime = percent * audio.duration;

                updateProgress(winId);
            });

            document.addEventListener("mouseup", () => {
                dragging = false;
            });
        }

                const angle = Math.atan2(dy, dx);

            });
        });

        function startGlossyBird(canvasId) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');

            // Estado do Jogo
            let birdY = 180;
            let velocity = 0;
            const gravity = 0.3; // Gravidade levemente reduzida para controle mais suave
            let pipes = [];
            let particles = [];
            let frame = 0;
            let score = 0;
            let gameOver = false;
            let birdAngle = 0;
            let gameStarted = false;

            // Configurações do Botão
            const btnW = 140;
            const btnH = 45;

            function reset() {
                birdY = 180;
                velocity = 0;
                birdAngle = 0;
                pipes = [];
                particles = [];
                frame = 0;
                score = 0;
                gameOver = false;
                gameStarted = true;
            }

            canvas.onclick = (e) => {
                if (typeof AudioEngine !== 'undefined') AudioEngine.resume();

                if (gameOver) {
                    const rect = canvas.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;
                    const btnX = (canvas.width / 2) - (btnW / 2);
                    const btnY = (canvas.height / 2) + 40;

                    if (mouseX >= btnX && mouseX <= btnX + btnW && mouseY >= btnY && mouseY <= btnY + btnH) {
                        reset();
                    }
                } else {
                    if (!gameStarted) gameStarted = true;
                    velocity = -5.8;
                    if (typeof AudioEngine !== 'undefined') AudioEngine.playJump();
                    // Adiciona partículas de impulso
                    createParticles(60, birdY, '#fff', 5);
                }
            };

            function createParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1.0,
                        color: color
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawBackground() {
                // --- Céu Noturno ---
                const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                skyGrad.addColorStop(0, '#020814');
                skyGrad.addColorStop(0.6, '#0a1628');
                skyGrad.addColorStop(1, '#0d1f3c');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // --- Estrelas (layer estática com twinkle) ---
                const stars = [
                    { x: 12, y: 8, r: 1.2, phase: 0.0 },
                    { x: 45, y: 22, r: 0.8, phase: 1.1 },
                    { x: 78, y: 5, r: 1.5, phase: 2.3 },
                    { x: 110, y: 18, r: 1.0, phase: 0.7 },
                    { x: 150, y: 10, r: 0.9, phase: 1.8 },
                    { x: 190, y: 28, r: 1.3, phase: 3.0 },
                    { x: 230, y: 6, r: 0.7, phase: 0.4 },
                    { x: 265, y: 20, r: 1.1, phase: 2.1 },
                    { x: 300, y: 12, r: 1.4, phase: 1.5 },
                    { x: 340, y: 25, r: 0.8, phase: 0.9 },
                    { x: 55, y: 40, r: 0.7, phase: 2.7 },
                    { x: 130, y: 35, r: 1.0, phase: 1.3 },
                    { x: 210, y: 42, r: 0.6, phase: 0.2 },
                    { x: 280, y: 38, r: 1.2, phase: 3.5 },
                    { x: 320, y: 15, r: 0.9, phase: 2.0 },
                ];
                stars.forEach(s => {
                    const alpha = 0.5 + 0.5 * Math.sin(Date.now() / 800 + s.phase);
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 220, ${alpha})`;
                    ctx.fill();
                });

                // --- Lua ---
                const moonX = canvas.width - 55;
                const moonY = 38;
                ctx.shadowBlur = 30;
                ctx.shadowColor = "rgba(200, 220, 255, 0.6)";
                const moonGrad = ctx.createRadialGradient(moonX - 5, moonY - 5, 2, moonX, moonY, 18);
                moonGrad.addColorStop(0, "#fffde0");
                moonGrad.addColorStop(0.6, "#d4e8ff");
                moonGrad.addColorStop(1, "#8ab0d0");
                ctx.beginPath();
                ctx.arc(moonX, moonY, 18, 0, Math.PI * 2);
                ctx.fillStyle = moonGrad;
                ctx.fill();
                // Sombra da lua (crescent feel)
                ctx.beginPath();
                ctx.arc(moonX + 6, moonY - 4, 15, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(2, 8, 20, 0.45)";
                ctx.fill();
                ctx.shadowBlur = 0;

                // --- Prédios com Parallax (3 camadas) ---
                // Cada camada: { speed, color, windowColor, buildings[] }
                // buildings: { x, w, h, floors, hasAntenna }
                const buildingLayers = [
                    {
                        // Camada de fundo (mais lenta, mais escura)
                        speed: 0.08,
                        fill: '#0e1a2b',
                        stroke: '#162236',
                        windowColor: ['rgba(255,220,120,0.7)', 'rgba(120,180,255,0.5)', 'rgba(0,0,0,0)'],
                        buildings: [
                            { rx: 0, w: 55, h: 110, floors: 7 },
                            { rx: 50, w: 40, h: 80, floors: 5 },
                            { rx: 85, w: 65, h: 140, floors: 9, antenna: true },
                            { rx: 145, w: 35, h: 70, floors: 4 },
                            { rx: 175, w: 70, h: 120, floors: 8 },
                            { rx: 240, w: 45, h: 90, floors: 6, antenna: true },
                            { rx: 280, w: 60, h: 130, floors: 8 },
                            { rx: 335, w: 50, h: 100, floors: 6 },
                            { rx: 380, w: 75, h: 150, floors: 10, antenna: true },
                        ]
                    },
                    {
                        // Camada do meio
                        speed: 0.18,
                        fill: '#0a1220',
                        stroke: '#111c30',
                        windowColor: ['rgba(255,230,100,0.85)', 'rgba(100,200,255,0.6)', 'rgba(0,0,0,0)'],
                        buildings: [
                            { rx: 10, w: 45, h: 90, floors: 6 },
                            { rx: 52, w: 60, h: 120, floors: 8, antenna: true },
                            { rx: 108, w: 38, h: 70, floors: 4 },
                            { rx: 142, w: 55, h: 105, floors: 7 },
                            { rx: 194, w: 42, h: 85, floors: 5 },
                            { rx: 232, w: 68, h: 135, floors: 9, antenna: true },
                            { rx: 296, w: 50, h: 95, floors: 6 },
                            { rx: 342, w: 65, h: 125, floors: 8 },
                            { rx: 400, w: 48, h: 88, floors: 5 },
                        ]
                    },
                    {
                        // Camada da frente (mais rápida, mais escura/detalhada)
                        speed: 0.32,
                        fill: '#060d18',
                        stroke: '#0c1626',
                        windowColor: ['rgba(255,240,140,0.95)', 'rgba(180,230,255,0.7)', 'rgba(0,0,0,0)'],
                        buildings: [
                            { rx: 0, w: 42, h: 80, floors: 5 },
                            { rx: 38, w: 58, h: 115, floors: 7, antenna: true },
                            { rx: 92, w: 35, h: 65, floors: 4 },
                            { rx: 124, w: 70, h: 140, floors: 9 },
                            { rx: 190, w: 40, h: 78, floors: 5 },
                            { rx: 226, w: 55, h: 108, floors: 7, antenna: true },
                            { rx: 278, w: 48, h: 95, floors: 6 },
                            { rx: 322, w: 62, h: 125, floors: 8 },
                            { rx: 380, w: 45, h: 85, floors: 5, antenna: true },
                        ]
                    }
                ];

                const groundY = canvas.height; // prédios nascem da base

                buildingLayers.forEach((layer, li) => {
                    const totalW = canvas.width + 100;
                    const offset = (frame * layer.speed) % totalW;

                    // Desenha 2x para looping seamless
                    for (let repeat = 0; repeat < 2; repeat++) {
                        layer.buildings.forEach((b, bi) => {
                            const bx = (b.rx - offset + repeat * totalW) % (totalW * 2) - 50;
                            const by = groundY - b.h;

                            // Silhueta do prédio
                            ctx.fillStyle = layer.fill;
                            ctx.strokeStyle = layer.stroke;
                            ctx.lineWidth = 0.8;
                            ctx.beginPath();
                            ctx.rect(bx, by, b.w, b.h);
                            ctx.fill();
                            ctx.stroke();

                            // Antena
                            if (b.antenna) {
                                ctx.strokeStyle = layer.stroke;
                                ctx.lineWidth = 1.5;
                                ctx.beginPath();
                                ctx.moveTo(bx + b.w / 2, by);
                                ctx.lineTo(bx + b.w / 2, by - 14);
                                ctx.stroke();
                                // Luz piscando no topo
                                const blinkAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 600 + bi * 1.3);
                                ctx.beginPath();
                                ctx.arc(bx + b.w / 2, by - 15, 2, 0, Math.PI * 2);
                                ctx.fillStyle = `rgba(255, 80, 80, ${blinkAlpha})`;
                                ctx.fill();
                            }

                            // Janelas
                            const winW = 5;
                            const winH = 6;
                            const colGap = 9;
                            const rowGap = 11;
                            const padX = 6;
                            const padY = 8;
                            const cols = Math.floor((b.w - padX * 2) / colGap);
                            const rows = b.floors;

                            for (let row = 0; row < rows; row++) {
                                for (let col = 0; col < cols; col++) {
                                    const wx = bx + padX + col * colGap;
                                    const wy = by + padY + row * rowGap;

                                    // Seed determinística por janela para manter padrão estável
                                    const seed = (li * 1000 + bi * 100 + row * 10 + col);
                                    const rand = ((seed * 9301 + 49297) % 233280) / 233280;

                                    let color;
                                    if (rand < 0.45) color = layer.windowColor[0];       // acesa (amarelo)
                                    else if (rand < 0.55) color = layer.windowColor[1];   // acesa (azul/branco)
                                    else color = layer.windowColor[2];                     // apagada

                                    if (color === 'rgba(0,0,0,0)') continue;

                                    ctx.fillStyle = color;
                                    ctx.fillRect(wx, wy, winW, winH);

                                    // Mini reflexo no canto superior da janela
                                    ctx.fillStyle = "rgba(255,255,255,0.2)";
                                    ctx.fillRect(wx, wy, 2, 2);
                                }
                            }
                        });
                    }
                });

                // --- Neblina de chão (une prédios com o grid do jogo) ---
                const fogGrad = ctx.createLinearGradient(0, canvas.height - 40, 0, canvas.height);
                fogGrad.addColorStop(0, 'rgba(6, 13, 24, 0)');
                fogGrad.addColorStop(1, 'rgba(6, 13, 24, 0.85)');
                ctx.fillStyle = fogGrad;
                ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            }

            function drawBird() {
                ctx.save();
                ctx.translate(60, birdY);

                // Rotação suave baseada na física
                birdAngle = Math.min(Math.PI / 3, Math.max(-Math.PI / 6, velocity * 0.12));
                ctx.rotate(birdAngle);

                // Brilho Externo (Glow)
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.4)';

                // Corpo Principal (Skeuomorfismo)
                const bodyGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 13);
                bodyGrad.addColorStop(0, '#ffffff'); // Reflexo especular
                bodyGrad.addColorStop(0.3, '#ffd84a');
                bodyGrad.addColorStop(1, '#b38600');

                ctx.fillStyle = bodyGrad;
                ctx.beginPath();
                ctx.ellipse(0, 0, 14, 11, 0, 0, Math.PI * 2);
                ctx.fill();

                // Asa com animação de bater
                const wingFlap = Math.sin(frame * 0.3) * 3;
                ctx.fillStyle = '#e6ac00';
                ctx.beginPath();
                ctx.ellipse(-4, 2 + wingFlap / 2, 7, 5 + wingFlap, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.stroke();

                // Olho e Bico
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(5, -3, 2.5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(6, -4, 1, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = '#ff7700';
                ctx.beginPath();
                ctx.moveTo(12, -2); ctx.lineTo(20, 0); ctx.lineTo(12, 4);
                ctx.fill();

                ctx.restore();
            }

            function drawPipe(x, y, w, h, isTop) {
                // Corpo do Cano
                const pipeGrad = ctx.createLinearGradient(x, 0, x + w, 0);
                pipeGrad.addColorStop(0, '#134e5e');
                pipeGrad.addColorStop(0.3, '#71b280');
                pipeGrad.addColorStop(0.5, '#a8e6cf'); // Glossy highlight
                pipeGrad.addColorStop(0.7, '#71b280');
                pipeGrad.addColorStop(1, '#082010');

                ctx.fillStyle = pipeGrad;
                ctx.fillRect(x, y, w, h);

                // Bordas e Brilho de Vidro
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, w, h);

                // Boca do Cano
                const capH = 20;
                const capX = x - 4;
                const capY = isTop ? y + h - capH : y;
                ctx.fillStyle = pipeGrad;
                ctx.fillRect(capX, capY, w + 8, capH);
                ctx.strokeRect(capX, capY, w + 8, capH);
            }

            function update() {
                if (!gameStarted) return;

                if (!gameOver) {
                    velocity += gravity;
                    birdY += velocity;
                    frame++;

                    // Gerar canos
                    if (frame % 90 === 0) {
                        const gap = 130;
                        const top = Math.random() * (canvas.height - gap - 80) + 40;
                        pipes.push({ x: canvas.width, top, scored: false });
                    }

                    // Mover canos e checar colisão
                    pipes.forEach(p => {
                        p.x -= 2.5;
                        if (!p.scored && p.x < 60) {
                            score++;
                            p.scored = true;

                            if (typeof AudioEngine !== 'undefined') AudioEngine.playPoint();

                            // 🏆 CONQUISTAS GLOSSY BIRD
                            if (score === 10) {
                                unlockAchievement("glossy_10");
                            }

                            if (score === 30) {
                                unlockAchievement("glossy_30");
                            }
                        }

                        // Hitbox circular simplificada
                        if (60 + 10 > p.x && 60 - 10 < p.x + 42) {
                            if (birdY - 8 < p.top || birdY + 8 > p.top + 130) {
                                triggerGameOver();
                            }
                        }
                    });

                    if (birdY > canvas.height || birdY < 0) triggerGameOver();
                    pipes = pipes.filter(p => p.x > -60);
                } else {
                    // Se morreu, cai girando
                    if (birdY < canvas.height - 15) {
                        velocity += gravity;
                        birdY += velocity;
                    }
                }
                updateParticles();
            }

            function triggerGameOver() {
                if (!gameOver) {
                    gameOver = true;

                    // 🏆 CONQUISTAS SECRETAS
                    if (score === 9) {
                        unlockAchievement("glossy_almost");
                    }

                    if (score === 0) {
                        unlockAchievement("glossy_zero");
                    }

                    createParticles(60, birdY, '#ffcc00', 15);

                    if (typeof AudioEngine !== 'undefined') {
                        AudioEngine.playHit();
                    }
                }
            }

            function drawHUD() {
                // Pontuação Flutuante
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 5;
                ctx.fillText(score, canvas.width / 2, 60);
                ctx.shadowBlur = 0;

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.4)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const cx = canvas.width / 2;
                    const cy = canvas.height / 2;

                    // Painel
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(cx - 90, cy - 60, 180, 140, 15);
                    ctx.fill();

                    ctx.fillStyle = '#333';
                    ctx.font = 'bold 18px Arial';
                    ctx.fillText("FIM DE JOGO", cx, cy - 20);
                    ctx.font = '24px Arial';
                    ctx.fillText(score, cx, cy + 15);

                    // Botão Reiniciar
                    const bx = cx - btnW / 2;
                    const by = cy + 40;
                    const btnGrad = ctx.createLinearGradient(bx, by, bx, by + btnH);
                    btnGrad.addColorStop(0, '#4facfe');
                    btnGrad.addColorStop(1, '#005bea');
                    ctx.fillStyle = btnGrad;
                    ctx.beginPath();
                    if (ctx.roundRect) ctx.roundRect(bx, by, btnW, btnH, 10);
                    ctx.fill();

                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText("REINICIAR", cx, by + 28);
                }
            }

            function loop() {
                drawBackground();
                update();

                // Desenhar Partículas
                particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 3, 3);
                });
                ctx.globalAlpha = 1;

                pipes.forEach(p => {
                    drawPipe(p.x, 0, 42, p.top, true);
                    drawPipe(p.x, p.top + 130, 42, canvas.height, false);
                });

                drawBird();
                drawHUD();
                requestAnimationFrame(loop);
            }

            loop();
        }

        function resetAchievements() {
            if (!confirm("Tem certeza que deseja resetar todas as conquistas?")) return;

            unlockedAchievements.clear();
            glossowsAchievements = [];
            glossowsXP = 0;

            localStorage.removeItem(STORAGE_KEY);

            alert("Conquistas resetadas!");

            // Atualiza Hub se estiver aberto
            const openHub = Object.keys(windowState).find(id =>
                windowState[id]?.app?.id === "hub"
            );

            if (openHub) {
                hubSelect(openHub, "achievements");
            }
        }

    </script>
