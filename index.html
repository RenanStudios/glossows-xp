<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossows XP</title>
    <link rel="icon" type="image/png" href="img/icon.png">
    <!-- Tailwind CSS for layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Estilos externos -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-default" id="main-body">

    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="loading-logo-wrap">
            <div class="loading-orb">
                <img src="img/os_logo.png" alt=""
                     style="width:40px;height:40px;position:absolute;top:50%;left:50%;
                        transform:translate(-50%,-50%);z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4));">
            </div>
            <div class="loading-title">Glossows <span>XP</span></div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loadingBar"></div>
            </div>
            <div class="loading-copy">© Renan Studios</div>
        </div>
    </div>

    <svg width="0" height="0" style="position:absolute">
        <defs>
            <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">

                <feTurbulence type="fractalNoise"
                              baseFrequency="0.012 0.012"
                              numOctaves="2"
                              seed="92"
                              result="noise" />

                <feGaussianBlur in="noise"
                                stdDeviation="1.5"
                                result="softNoise" />

                <feDisplacementMap in="SourceGraphic"
                                   in2="softNoise"
                                   scale="55"
                                   xChannelSelector="R"
                                   yChannelSelector="G" />

            </filter>
        </defs>
    </svg>

    <div id="achievement-popup-container"></div>

    <!-- Lock Screen -->
    <div id="lockscreen">
        <div class="lock-glass">
            <div class="lock-time" id="lock-time">12:00</div>
            <div class="lock-date" id="lock-date">Domingo, 14 de Dezembro</div>
            <div class="slide-hint">
                <i class="fas fa-chevron-up"></i><br>
                Deslize para cima
            </div>
        </div>
    </div>

    <!-- Desktop -->
    <div id="desktop" class="p-4 flex flex-col flex-wrap h-[calc(100vh-45px)] content-start gap-2">
        <!-- Icons generated by JS -->
    </div>

    <!-- Windows Container -->
    <div id="windows-area"></div>

    <!-- Start Menu -->
    <div id="start-menu">
        <div class="p-2 bg-blue-700 text-white font-bold flex items-center gap-2">
            <img src="img/os_logo.png" alt="Logo Glossows XP" class="w-5 h-5">
            Glossows XP
        </div>
        <div class="start-wallpaper">
            <div class="start-item font-bold wallpaper-toggle" onclick="toggleWallpaperMenu()">
                <i class="fas fa-image text-purple-600"></i>
                Papel de Parede
                <i class="fas fa-caret-up ml-auto arrow"></i>
            </div>

            <div class="wallpaper-submenu">

                <div class="wallpaper-item" onclick="selectWallpaper(0)">
                    <div class="wallpaper-thumb bg-default"></div>
                    <span>Holo</span>
                </div>

                <div class="wallpaper-item" onclick="selectWallpaper(1)">
                    <div class="wallpaper-thumb bg-vista"></div>
                    <span>Vista</span>
                </div>

                <div class="wallpaper-item" onclick="selectWallpaper(2)">
                    <div class="wallpaper-thumb bg-dark"></div>
                    <span>Dark</span>
                </div>

                <div class="wallpaper-item" onclick="selectWallpaper(3)">
                    <div class="wallpaper-thumb bg-ubuntu"></div>
                    <span>Ubuntu</span>
                </div>

                <div class="wallpaper-item" onclick="selectWallpaper(4)">
                    <div class="wallpaper-thumb bg-binbows7"></div>
                    <span>Binbows 7</span>
                </div>

            </div>
        </div>
        <div class="start-item" onclick="location.reload()">
            <i class="fas fa-redo text-green-600"></i> Reiniciar
        </div>
        <div class="start-item" onclick="shutdown()">
            <i class="fas fa-power-off text-red-600"></i> Desligar
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="flex items-center">
            <div id="start-btn" onclick="toggleStartMenu()">
                <img src="img/os_logo.png" alt="Logo" class="w-5 h-5"> Iniciar
            </div>
            <div class="ml-4 flex gap-1" id="taskbar-apps">
                <!-- Open apps appear here -->
            </div>
        </div>
        <div class="text-white text-right text-xs leading-tight pr-2 border-l border-white/20 pl-2">
            <div id="task-time" class="font-bold text-sm">12:00</div>
            <div id="task-date">14/12/2025</div>
        </div>
    </div>

    <!-- Shutdown Overlay -->
    <div id="shutdown-screen" class="fixed inset-0 z-[10000] hidden flex flex-col items-center justify-center gap-7 text-white"
         style="background: linear-gradient(to bottom, #0b3c85 0%, #0e63c8 35%, #1890ff 55%, #0c5ec0 75%, #072b5f 100%); font-family: 'Segoe UI', Tahoma, sans-serif;">

        <!-- Black Screen Final (Overlay de fade out total) -->
        <div id="black-screen" class="fixed inset-0 bg-black z-[11000] hidden" style="opacity:0; pointer-events: none;"></div>

        <div class="loading-logo-wrap">
            <div class="loading-orb">
                <img src="img/os_logo.png" alt="OS Logo" class="w-[110px] h-[110px]"
                     style="filter: drop-shadow(0 0 24px rgba(90, 176, 255, 0.85)) drop-shadow(0 0 60px rgba(40, 120, 255, 0.5)) drop-shadow(0 8px 20px rgba(0, 0, 0, 0.55));">
            </div>
            <div class="loading-title text-3xl">Glossows <span>XP</span></div>
        </div>

        <div class="flex flex-col items-center gap-4">
            <p id="shutdown-status" class="text-lg font-light tracking-wide animate-pulse" style="text-shadow: 0 2px 8px rgba(0,0,0,0.5);">Desligando o Windows...</p>

            <!-- Barra de progresso seguindo o estilo da track de loading -->
            <div class="loading-bar-track w-64">
                <div id="shutdown-progress" class="loading-bar-fill h-full w-0 transition-all duration-300"></div>
            </div>

            <div class="loading-copy mt-2">Salvando suas configurações...</div>
        </div>
    </div>

    <!-- Som de shutdown -->
    <audio id="shutdown-sound" src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAAA=" preload="auto"></audio>

    <div class="flex justify-between w-full mb-2 px-3 py-1 rounded"
         style="
        background: linear-gradient(to bottom, #e0ecff, #b6c9e6);
        border: 1px solid #6b7a94;
        box-shadow: inset 0 1px 0 #fff;
        font-size: 12px;
        font-weight: bold;
    ">
        ⏱ <span id="time-${winId}">0</span>s
        💣 <span id="mines-${winId}-count">10</span>
    </div>


    <!-- Scripts externos -->
    <script src="script.js"></script>
</body>
</html>
